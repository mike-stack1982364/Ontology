<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Loading Ontological Deception V19</title></head><body><noscript>This game requires JavaScript.</noscript><script>(async()=>{const r=await fetch("https://raw.githubusercontent.com/mike-stack1982364/Ontology/05a4510041287f89f9b4bc99d2b71500b0a1fa51/index.html",{cache:"force-cache"});if(!r.ok)throw new Error("base build "+r.status);let h=await r.text();h=h.replace("</head>","<style>"+"\n.v19-frame{display:inline-block;margin-left:.45rem;padding:.18rem .45rem;border:1px solid #cbc4e4;border-radius:999px;background:#faf9ff;color:#5b3fd6;font-size:.55rem;letter-spacing:.8px;white-space:normal}.v19-frame:hover{border-color:#8f83c4}#v19-panel{margin:10px 0 12px;padding:12px;border:1px solid #d9d4ec;border-radius:15px;background:rgba(255,255,255,.76)}.v19-head{display:flex;justify-content:space-between;gap:8px;color:#5b3fd6;font-size:.58rem;letter-spacing:1.4px}.v19-head span{color:#8a6516;letter-spacing:.2px}#v19-current{margin:8px 0;font-size:.72rem;font-weight:800;color:#3a2f66}#v19-current small{display:block;margin-top:3px;font-weight:500;color:#77708f;line-height:1.35}#v19-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:4px}.v19-dot{display:block;aspect-ratio:1;border-radius:5px;border:1px solid #d9d4ec;background:#eeecf6}.v19-dot.seen{background:#dcd5f4;border-color:#9a8fd0}.v19-dot.good{background:#dcefe4;border-color:#4d9d70}.v19-dot.weak{background:#f5d4dc;border-color:#cf6c83}.v19-axis{display:grid;grid-template-columns:repeat(3,1fr);font-size:.48rem;color:#9991b4;margin-top:4px}.v19-axis span:nth-child(2){text-align:center}.v19-axis span:last-child{text-align:right}.v19-codex{border:1px solid #d9d4ec;border-radius:14px;padding:12px;margin-bottom:16px;background:#faf9ff}.v19-codex small{font-size:.78em;color:#77708f}@media(max-width:720px){.v19-head{font-size:.52rem}.v19-frame{display:block;margin:.35rem auto 0;width:max-content;max-width:100%}}\n"+"</style></head>");h=h.replace("</body>","<script>"+"(()=>{\n'use strict';\nconst BUILD='V19', STORE='ontology.v19.matrix';\nconst BASES=[\n{id:'all',name:'All',inner:'Collection / gathered whole',outer:'Likeness / copy',def:'unity, identity, or the relation by which plurality is apprehended as one'},\n{id:'difference',name:'Difference',inner:'Inside / within',outer:'Outside / without',def:'the boundary or distinction by which states become discriminable'},\n{id:'action',name:'Action',inner:'Action upon / within',outer:'Action by / upon another',def:'change organised as a directed transformation'},\n{id:'division',name:'Division',inner:'Isolation / subtraction',outer:'Subdivision / pluralisation',def:'separation by removal from a whole or partition of that whole'},\n{id:'connection',name:'Connection',inner:'Centre / nexus / medium',outer:'Attachment / possession',def:'the bridge or hub through which distinct terms are related'},\n{id:'multiplication',name:'Multiplication',inner:'Support / reinforcement',outer:'Expansion / propagation',def:'increase by strengthening a unit or propagating units'},\n{id:'projection',name:'Projection',inner:'Reception / toward',outer:'Emission / away',def:'directed extension toward or away from a reference term'},\n{id:'encompassment',name:'Encompassment',inner:'Expansion from within',outer:'Engulfment from without',def:'containment understood through opposed directions of enclosing force'},\n{id:'completion',name:'Completion',inner:'Sufficiency / lower bound',outer:'Constraint / upper bound',def:'closure in which nothing required is missing and nothing forbidden is excessive'}\n];\nconst F={a:{name:'Archetypal',cue:'relation itself \u00b7 invariant across both faces',symbol:'\u25c7'},i:{name:'Inner',cue:'within the reference \u00b7 received or generated internally',symbol:'\u21b6'},o:{name:'Outer',cue:'through context \u00b7 emitted, attached, or constrained externally',symbol:'\u2197'}};\nconst SUPPORT={pair:['all','difference','division','connection','multiplication','encompassment','completion'],field:['all','difference','action'],bead:['connection','action','completion'],testimony:['difference','division','projection'],gesture:['action','projection','completion'],weave:['difference','action','multiplication','encompassment','completion']};\nconst FRAME_FORMS={all:{a:['pair','field'],i:['pair'],o:['pair','field']},difference:{a:['pair','field'],i:['pair','weave'],o:['pair','field']},action:{a:['field','weave','gesture'],i:['gesture'],o:['gesture','field']},division:{a:['pair','testimony'],i:['testimony','pair'],o:['pair','testimony']},connection:{a:['bead','pair'],i:['field','bead'],o:['pair','bead']},multiplication:{a:['pair','weave'],i:['weave'],o:['weave']},projection:{a:['testimony','gesture'],i:['gesture','testimony'],o:['gesture','testimony']},encompassment:{a:['pair','weave'],i:['weave'],o:['pair','weave']},completion:{a:['pair','bead'],i:['pair','weave'],o:['gesture','bead','weave']}};\nconst UNLOCK={all:1,difference:1,division:1,encompassment:2,connection:3,multiplication:4,action:5,completion:7,projection:9};\nlet clock=0, stats={};\nfor(const b of BASES)for(const p of ['a','i','o'])stats[b.id+':'+p]={s:0,c:0,last:-99,streak:0,rt:0};\ntry{const q=JSON.parse(localStorage.getItem(STORE)||'{}');if(q.stats)for(const k in stats)if(q.stats[k])stats[k]=Object.assign(stats[k],q.stats[k]);clock=+q.clock||0}catch(e){}\nconst base=id=>BASES.find(x=>x.id===id)||BASES[0], key=(b,p)=>b+':'+p;\nconst mastery=k=>{const z=stats[k]||{s:0,c:0};return(z.c+1)/(z.s+2)};\nconst weak=k=>{const z=stats[k]||{s:0,c:0,last:-99};return(1-mastery(k))*100+45/Math.sqrt(z.s+1)+Math.min(30,Math.max(0,clock-z.last)*2.5)};\nconst frames=()=>state.level<4?['a']:state.level<7?['a','i']:['a','i','o'];\nconst label=(b,p)=>{const x=base(b);return p==='a'?x.name:(p==='i'?'Inner ':'Outer ')+x.name+' \u2014 '+(p==='i'?x.inner:x.outer)};\nfunction save(){try{localStorage.setItem(STORE,JSON.stringify({clock,stats}))}catch(e){}}\nfunction chooseBase(cfg){\n const forms=Object.keys(cfg.forms||{}),pool=[];\n for(const f of forms)for(const b of SUPPORT[f]||[])if((UNLOCK[b]||1)<=state.level&&!pool.includes(b))pool.push(b);\n if(!pool.length)return'all';\n const a=pool.map(b=>({b,w:Math.max(...frames().map(p=>weak(key(b,p))))})).sort((x,y)=>y.w-x.w).slice(0,4);\n let r=Math.random()*a.reduce((s,x)=>s+Math.max(1,x.w),0);for(const x of a){r-=Math.max(1,x.w);if(r<=0)return x.b}return a[0].b;\n}\nfunction chooseFrame(b){const a=frames().map(p=>({p,w:weak(key(b,p))-(state._v19last===key(b,p)?35:0)})).sort((x,y)=>y.w-x.w).slice(0,2);return Math.random()<.72?a[0].p:pick(a).p}\nfunction chooseForm(cfg,b,p){let a=Object.keys(cfg.forms||{}).filter(f=>(SUPPORT[f]||[]).includes(b)&&(((FRAME_FORMS[b]||{})[p]||[]).includes(f)));if(!a.length)a=Object.keys(cfg.forms||{}).filter(f=>(SUPPORT[f]||[]).includes(b));if(!a.length)return Object.keys(cfg.forms||{})[0];const w=a.map(f=>({f,w:(cfg.forms[f]||1)*(f==='pair'?1:1.25)}));let r=Math.random()*w.reduce((s,x)=>s+x.w,0);for(const x of w){r-=x.w;if(r<=0)return x.f}return w[0].f}\nfunction configure(cfg,form,b,p){\n if(form==='pair'){\n  cfg.pair.balance=false;\n  if(b==='all'){cfg.pair.rels=['SAME'];cfg.pair.mode=state.level>7?'induct':'named'}\n  else if(b==='difference'){cfg.pair.rels=[state.level>3?pick(['DIFFERENT','OPPOSITE']):'DIFFERENT'];cfg.pair.mode=state.level>7?'induct':'named'}\n  else if(b==='division'){cfg.pair.rels=['COMPARISON'];cfg.pair.mode=state.level>7?'induct':'named'}\n  else if(b==='connection'){cfg.pair.rels=['SAME'];cfg.pair.mode=state.level>9?'echo':'named'}\n  else if(b==='multiplication'){cfg.pair.rels=['COMPARISON'];cfg.pair.mode=state.level>12?'span':'named'}\n  else if(b==='encompassment'){cfg.pair.rels=['ENFOLDMENT'];cfg.pair.mode=state.level>7?'induct':'named'}\n  else if(b==='completion'){cfg.pair.rels=['SAME'];cfg.pair.mode='balance';cfg.pair.balance=true}\n }else if(form==='field')cfg.field.rules=[b==='all'?'SAME':b==='action'?'STEP':'MIRROR'];\n else if(form==='bead')cfg.bead.mode=b==='connection'?'rev':b==='action'?'revshift':'comp';\n else if(form==='testimony')cfg.testimony.forges=b==='division'?['offByOne']:b==='projection'?['dirFlip']:['polaritySwap','labelSwap','negation'];\n else if(form==='gesture'){\n  if(b==='projection'&&p==='o'){cfg.gesture.mode='mixed';cfg.gesture.gmix=['shadows']}\n  else{cfg.gesture.mode='mixed';cfg.gesture.gmix=['enact'];cfg.gesture.inv=p==='i'}\n }else if(form==='weave'){\n  const lead=b==='multiplication'?(p==='i'?'SWELL':p==='o'?'GROW':pick(['GROW','SWELL'])):b==='encompassment'?(p==='i'?'SWELL':'ENFOLD'):b==='action'?'TURN':b==='completion'?(p==='o'?'TURN':'ENFOLD'):'MIRROR';\n  const n=cfg.weave.nRules||1,c=['GROW','SWELL','TURN','ENFOLD','PERMUTE','MIRROR'].filter(x=>x!==lead&&!(lead==='TURN'&&x==='MIRROR')&&!(lead==='MIRROR'&&x==='TURN')&&!(lead==='GROW'&&x==='SWELL')&&!(lead==='SWELL'&&x==='GROW')),r=[lead];while(r.length<n&&c.length)r.push(c.splice(rnd(c.length),1)[0]);cfg.weave.rules=r;cfg.weave.nRules=r.length;\n }\n}\nfunction infer(t,f){\n if(state._v19base)return state._v19base;f=f||t.form||state.form;\n if(f==='balance'||t.mode==='balance'||t.rel==='BALANCE')return'completion';\n if(f==='pair'){if(t.span)return'multiplication';if(t.echo)return'connection';if(t.polar)return'difference';return t.rel==='SAME'?'all':t.rel==='COMPARISON'?'division':t.rel==='ENFOLDMENT'?'encompassment':'difference'}\n if(f==='field')return t.law==='SAME'?'all':t.law==='STEP'?'action':'difference';\n if(f==='bead')return t.mode==='comp'?'completion':t.mode==='revshift'?'action':'connection';\n if(f==='shadows')return'projection';if(f==='rite')return t.inv?'projection':'action';if(f==='gesture')return'action';\n if(f==='testimony'){const n=(t.lieName||'').toLowerCase();return n.includes('off-by-one')?'division':n.includes('direction')?'projection':'difference'}\n if(f==='weave'){const r=t.rules||[];if(r.includes('ENFOLD'))return'encompassment';if(r.includes('GROW')||r.includes('SWELL'))return'multiplication';if(r.includes('TURN'))return'action';return'difference'}return'connection';\n}\nfunction prep(){if(!state.trial||(typeof gauge2!=='undefined'&&gauge2.active))return;const b=infer(state.trial,state.form),p=state._v19frame||chooseFrame(b);state._v19={b,p,resolved:false};const rb=$('rule-banner');if(rb&&!rb.querySelector('.v19-frame'))rb.insertAdjacentHTML('beforeend',' <span class=\"v19-frame\" title=\"This lens is embodied in the puzzle; it is not a second question\">'+F[p].symbol+' LENS: '+F[p].cue.toUpperCase()+'</span>');renderPanel()}\nfunction loadTags(t){const a=[];if(!t)return a;if(t.witness||t.polar||t.echo||t.span)a.push('analogy');if(t.seq&&t.seq.length>1)a.push('composition');if(t.inv)a.push('inversion');if(t.rules&&t.rules.length>1)a.push('multi-rule');if(t.veil||t.noise||t.noiseAttr)a.push('interference');if(t.mode==='comp'||t.mode==='revshift')a.push('symbolic recoding');if(!a.length)a.push(state.level<4?'relation discrimination':'rule induction');return a.slice(0,3)}\nfunction evidence(ok){const o=state._v19;if(!o||o.resolved)return;const k=key(o.b,o.p),z=stats[k],rt=state._askAt?Date.now()-state._askAt:0;clock++;z.s++;if(ok)z.c++;z.streak=ok?(z.streak||0)+1:0;z.last=clock;if(rt)z.rt=z.rt?Math.round(z.rt*.72+rt*.28):rt;o.resolved=true;state._v19last=k;save()}\nfunction seal(){const o=state._v19,e=$('explain');if(!o||!e||e.dataset.v19)return;e.dataset.v19='1';e.insertAdjacentHTML('beforeend','<br><b>Ontological seal:</b> '+label(o.b,o.p)+' \u2014 '+base(o.b).def+'. <b>Frame:</b> '+F[o.p].cue+'. <b>Relational load:</b> '+loadTags(state.trial).join(' \u00b7 ')+'.')}\nfunction renderPanel(){const g=$('v19-grid');if(!g)return;let sampled=0,seen=0,correct=0;g.innerHTML='';for(const p of ['a','i','o'])for(const b of BASES){const k=key(b.id,p),z=stats[k],d=document.createElement('span');d.className='v19-dot';if(z.s){sampled++;seen+=z.s;correct+=z.c;const q=mastery(k);d.classList.add(q>=.76&&z.s>=3?'good':q<.5&&z.s>=2?'weak':'seen')}d.title=label(b.id,p)+' \u00b7 '+z.c+'/'+z.s+' \u00b7 calibrated '+Math.round(100*mastery(k))+'%';g.appendChild(d)}$('v19-score').textContent=seen?sampled+'/27 sampled \u00b7 '+Math.round(100*correct/seen)+'% answers':'0/27 sampled';const o=state._v19;$('v19-current').innerHTML=o?(o.resolved?label(o.b,o.p)+'<small>'+base(o.b).def+' \u00b7 calibrated '+Math.round(100*mastery(key(o.b,o.p)))+'%</small>':'Latent cell active<small>Resolve this puzzle once; its ontological seal appears in feedback.</small>'):'The hidden curriculum awaits the next trial.<small>Nine operations \u00d7 three frames \u00b7 never a second answer.</small>'}\nfunction installUI(){\n const m=$('mastery');if(m&&!$('v19-panel'))m.insertAdjacentHTML('afterend','<section id=\"v19-panel\" aria-label=\"27-fold ontological curriculum\"><div class=\"v19-head\"><b>27-FOLD ONTOLOGICAL CURRICULUM</b><span id=\"v19-score\">0/27 sampled</span></div><div id=\"v19-current\">The hidden curriculum awaits the next trial.<small>Nine operations \u00d7 three frames \u00b7 never a second answer.</small></div><div id=\"v19-grid\"></div><div class=\"v19-axis\"><span>Archetypal</span><span>Inner</span><span>Outer</span></div></section>');\n const c=$('codex-modal')&&$('codex-modal').querySelector('.codex');if(c)c.insertAdjacentHTML('afterbegin','<section class=\"v19-codex\"><h2>Instructions Codex \u00b7 V19</h2><p><b>The interaction contract:</b> one trial, one answer, immediate feedback, then the next trial. The 27-fold category is <b>never</b> asked as a second question. It is embodied in the puzzle, inferred by the engine, and revealed afterward as an ontological seal.</p><p><b>The hidden curriculum:</b> nine operations \u00d7 three frames. Each answer updates both ordinary accuracy and one latent matrix cell. Selection is uncertainty-aware and spaced: weak, under-sampled, and long-unseen cells recur more often, while the visible level still rises only through performance.</p><p><b>What difficulty means:</b> levels add distractor similarity, veils, rule induction, analogy across registers, composition, inversion, symbolic recoding, and multi-rule interference without adding another response step.</p><h2>The nine operations in three frames</h2><table class=\"op-table\"><tr><th>Operation</th><th>Inner</th><th>Outer</th></tr>'+BASES.map(b=>'<tr><td><b>'+b.name+'</b><br><small>'+b.def+'</small></td><td>'+b.inner+'</td><td>'+b.outer+'</td></tr>').join('')+'</table><p><b>Source discipline:</b> Meru supplies structural motifs\u2014ternary 3\u00d73\u00d73 organisation, pointing/direction, reversal, pairing, gesture, projection and whole-from-many. Woodson supplies the nine-by-three ontological schema. V19 turns those ideas into training mechanics; that is a designed operationalisation, not proof that the metaphysical claims or far transfer are scientifically established.</p></section>');\n document.querySelectorAll('.codex p').forEach(p=>{if(p.textContent.includes('Build V16'))p.innerHTML=p.innerHTML.replace(/Build V16/g,'Build V19')});\n const tag=document.querySelector('.tagline');if(tag&&!tag.textContent.includes('V19'))tag.insertAdjacentHTML('beforeend',' <span style=\"opacity:.45\">\u00b7 V19</span>');renderPanel();\n}\nconst baseStart=startClock;startClock=function(s,x){prep();return baseStart(s,x)};\nconst baseRecord=recordResult;recordResult=function(ok,fell){if(typeof gauge2!=='undefined'&&gauge2.active)return baseRecord(ok,fell);evidence(!!ok);const before=LOG.length,r=baseRecord(ok,fell);if(LOG.length>before&&state._v19){const row=LOG[LOG.length-1];row.splice(3,0,key(state._v19.b,state._v19.p),Math.round(100*mastery(key(state._v19.b,state._v19.p))))}seal();renderPanel();return r};\nrunTrial=function(){state._v19base=null;state._v19frame=null;state._v19=null;clearTrialUI();renderStats();renderMastery();const cfg=JSON.parse(JSON.stringify(levelCfg(state.level))),b=chooseBase(cfg),p=chooseFrame(b),form=chooseForm(cfg,b,p);state._v19base=b;state._v19frame=p;configure(cfg,form,b,p);state.form=form;if(form==='pair')runPair(cfg.pair);else if(form==='field')runField(cfg.field);else if(form==='bead')runBead(cfg.bead);else if(form==='testimony')runTestimonyF(cfg.testimony);else if(form==='gesture'){const m0=cfg.gesture.mode||'compare',m=m0==='mixed'?pick(cfg.gesture.gmix||['compare','enact']):m0;if(m==='enact')runRite(cfg.gesture);else if(m==='shadows')runShadows(cfg.gesture);else runGesture(cfg.gesture)}else runWeaveF(cfg.weave)};\nconst baseStop=stopTraining;stopTraining=function(){state._v19base=null;state._v19frame=null;state._v19=null;const r=baseStop();renderPanel();return r};\nconst reset=$('reset-btn');if(reset){const old=reset.onclick;reset.onclick=()=>{for(const k in stats)stats[k]={s:0,c:0,last:-99,streak:0,rt:0};clock=0;save();old();renderPanel()}}\nconst csv=$('csv-btn');if(csv)csv.onclick=()=>{$('progress-text').value='form,level,correct,ontology_cell,cell_mastery_pct,rt_ms,time\\n'+LOG.map(r=>r.join(',')).join('\\n')};\ninstallUI();console.log('ONTOLOGICAL DECEPTION \u00b7 '+BUILD+' \u00b7 one answer / 27-fold adaptive curriculum');\n})();\n"+"<\/script></body>");document.open();document.write(h);document.close()})().catch(e=>{document.body.innerHTML="<main style='font:16px system-ui;padding:24px'><h1>Unable to load the game</h1><p>"+String(e)+"</p><p>Refresh while online.</p></main>"})</script></body></html>
