<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ontological Deception V21</title>
<style>
  html,body{margin:0;min-height:100%;background:#f7f6fc;color:#31275c;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  #boot{min-height:100vh;display:grid;place-items:center;padding:24px;box-sizing:border-box;text-align:center}
  #boot-card{max-width:560px;padding:26px 28px;border:1px solid #d9d4ec;border-radius:18px;background:#fff;box-shadow:0 12px 35px rgba(52,38,99,.08)}
  #boot-title{font-weight:800;letter-spacing:.08em;color:#5b3fd6}
  #boot-status{margin-top:10px;line-height:1.55;color:#746c91}
  #boot-error{display:none;margin-top:14px;padding:12px;border-radius:12px;background:#fff1f3;color:#9f1239;white-space:pre-wrap;text-align:left;font-size:.86rem}
  #retry{display:none;margin:16px auto 0;padding:10px 18px;border:0;border-radius:10px;background:#5b3fd6;color:#fff;font-weight:750;cursor:pointer}
</style>
</head>
<body>
<main id="boot"><section id="boot-card">
  <div id="boot-title">ONTOLOGICAL DECEPTION · V21</div>
  <div id="boot-status">Loading the relational engine…</div>
  <div id="boot-error" role="alert"></div>
  <button id="retry" type="button">Retry</button>
</section></main>
<script>
(() => {
  'use strict';
  const SOURCE = 'https://raw.githubusercontent.com/mike-stack1982364/Ontology/39a02b158df2d60666ead36a7dbe97489f007c6c/index.html';
  const status = document.getElementById('boot-status');
  const errorBox = document.getElementById('boot-error');
  const retry = document.getElementById('retry');

  const setStatus = text => { status.textContent = text; };
  const showError = err => {
    const detail = err && (err.stack || err.message) ? (err.stack || err.message) : String(err);
    setStatus('The game could not initialise.');
    errorBox.style.display = 'block';
    errorBox.textContent = detail;
    retry.style.display = 'block';
  };

  const loadScript = src => new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = src;
    script.async = true;
    script.onload = resolve;
    script.onerror = () => reject(new Error('Failed to load decompression fallback: ' + src));
    document.head.appendChild(script);
  });

  async function gunzip(bytes) {
    if (typeof DecompressionStream === 'function') {
      try {
        const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
        return await new Response(stream).text();
      } catch (nativeError) {
        console.warn('Native gzip decompression failed; using fallback.', nativeError);
      }
    }

    const sources = [
      'https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js'
    ];
    let lastError;
    for (const src of sources) {
      try {
        if (!window.pako) await loadScript(src);
        if (window.pako && typeof window.pako.ungzip === 'function') {
          return window.pako.ungzip(bytes, {to: 'string'});
        }
      } catch (err) {
        lastError = err;
      }
    }
    throw lastError || new Error('No supported gzip decompressor is available in this browser.');
  }

  async function boot() {
    errorBox.style.display = 'none';
    retry.style.display = 'none';
    setStatus('Loading the relational engine…');

    const response = await fetch(SOURCE + '?recovery=1', {cache: 'no-store'});
    if (!response.ok) throw new Error('Could not retrieve the V21 engine (HTTP ' + response.status + ').');
    const packed = await response.text();
    const match = packed.match(/atob\(["']([A-Za-z0-9+/=]+)["']\)/);
    if (!match) throw new Error('The V21 engine payload could not be located.');

    setStatus('Verifying and unpacking the engine…');
    const binary = atob(match[1]);
    const bytes = Uint8Array.from(binary, ch => ch.charCodeAt(0));
    const html = await gunzip(bytes);
    if (!/<!doctype html/i.test(html) || !html.includes('V21 derived-relation engine active')) {
      throw new Error('The unpacked engine failed its integrity check.');
    }

    document.open();
    document.write(html);
    document.close();
  }

  retry.addEventListener('click', () => boot().catch(showError));
  boot().catch(showError);
})();
</script>
</body>
</html>
